<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Konnichi-WOW! Speak Japanese in 30 Days</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* Safe area padding for mobile navigation */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    /* Prevent text selection on game buttons */
    .no-select { user-select: none; -webkit-user-select: none; }
    /* Hide scrollbar for clean UI but allow scrolling */
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-50 font-sans text-gray-800 selection:bg-pink-200">

  <!-- Main Application Container -->
  <div id="root">
    <!-- Content injected via JavaScript -->
  </div>

  <script type="module">
    // --- SAFE DYNAMIC FIREBASE SETUP ---
    // This structure guarantees the app won't crash on GitHub pages if config is missing.
    let db, auth, doc, setDoc, onSnapshot, signOut, signInAnonymously, signInWithCustomToken;
    let useFirebase = false;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    // --- APPLICATION STATE ---
    const state = {
      user: null,
      profileName: "Learner",
      isAuthLoading: true,
      currentView: 'dashboard',
      activeDay: 1,
      completedDays: [],
      mistakesRecord: {},
      gameStep: 0,
      score: 0,
      selectedAnswer: null,
      showFeedback: false,
      isRecording: false,
      currentMistakes: [],
      transInput: '',
      transResult: '',
      transLoading: false
    };

    // Pre-warm Speech Synthesis to load voices (fixes Firefox delay)
    if ('speechSynthesis' in window) {
      window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    // --- DATA & SYLLABUS ---
    const DETAILED_LESSONS = [
      {
        day: 1,
        title: "First Encounters: The Magic of Greetings",

        theory: {

            { kana: "こんにちは", romaji: "Konnichiwa", eng: "Good afternoon / Hello", context: "Standard daytime greeting." },
            { kana: "こんばんは", romaji: "Konbanwa", eng: "Good evening", context: "Use after sunset." },
            { kana: "すみません", romaji: "Sumimasen", eng: "Excuse me / Sorry", context: "Use to get a waiter's attention or apologize." },
            { kana: "ありがとう", romaji: "Arigatou", eng: "Thank you", context: "Add 'gozaimasu' to be polite to strangers." }
          ],
          culture: "Bow slightly (about 15 degrees) when saying these to strangers or superiors. It shows instant respect."
        },
        exercises: [
          { type: 'multiple_choice', question: "It's 8:30 AM and you see your boss. What do you say?", options: ["Konnichiwa", "Ohayou gozaimasu", "Konbanwa"], optionsKana: ["こんにちは", "おはようございます", "こんばんは"], answer: 1, conceptTag: "Morning Greeting", feedback_incorrect: "The sun is just coming up! 'Konnichiwa' is for daytime." },
          { type: 'listen', question: "Listen to the audio. Which greeting is this?", audioKana: "こんにちは", options: ["Good morning", "Good afternoon", "Good evening"], answer: 1, conceptTag: "Listening Comp", feedback_incorrect: "That was 'Konnichiwa' (Good afternoon)." },
          { type: 'speak', question: "Tap the microphone and say 'Good evening' in Japanese.", expectedRomaji: ["konbanwa", "kombanwa"], expectedKana: ["こんばんは"], conceptTag: "Pronunciation", feedback_incorrect: "Try to say 'Konbanwa'. Focus on the 'ban' sound!" },
          { type: 'multiple_choice', question: "You bumped into someone on the train. What is the best thing to say?", options: ["Arigatou", "Sumimasen", "Ohayou"], optionsKana: ["ありがとう", "すみません", "おはよう"], answer: 1, conceptTag: "Apology", feedback_incorrect: "'Sumimasen' means 'Excuse me' or 'Sorry'. It's perfect for bumping into people." },
          { type: 'listen', question: "What does this mean?", audioKana: "すみません", options: ["Thank you", "Excuse me / Sorry", "Good night"], answer: 1, conceptTag: "Listening", feedback_incorrect: "That was 'Sumimasen'." },
          { type: 'speak', question: "Say 'Thank you' (Casual)", expectedRomaji: ["arigato", "arigatou"], expectedKana: ["ありがとう"], conceptTag: "Pronunciation", feedback_incorrect: "Say 'A-ri-ga-to-u'." },
          { type: 'multiple_choice', question: "How do you make 'Arigatou' polite when talking to a cashier?", options: ["Arigatou sumimasen", "Arigatou gozaimasu", "Arigatou konnichiwa"], optionsKana: ["ありがとうすみません", "ありがとうございます", "ありがとうこんにちは"], answer: 1, conceptTag: "Politeness", feedback_incorrect: "Add 'gozaimasu' to make things polite!" },
          { type: 'listen', question: "Identify this phrase:", audioKana: "おはようございます", options: ["Good evening", "Good morning (Polite)", "Excuse me"], answer: 1, conceptTag: "Listening", feedback_incorrect: "Listen for the long 'gozaimasu' at the end. It's 'Ohayou gozaimasu'." },
          { type: 'speak', question: "Call the waiter! Say 'Excuse me!'", expectedRomaji: ["sumimasen"], expectedKana: ["すみません"], conceptTag: "Pronunciation", feedback_incorrect: "Say 'Su-mi-ma-sen!'" }
        ]
      },
      {
        day: 2,
        title: "Who Am I? The Power of 'Desu'",
        topic: "Self Introduction",
        theory: {
          intro: "Today, we learn how to state facts using the most important word in Japanese: 'Desu'. We also learn how to introduce ourselves.",
          concept: "'Desu' acts like 'is/am/are'. The structure is: [Topic] wa [Info] desu.",
          examples: [
            { kana: "わたしはマリアです", romaji: "Watashi wa Maria desu.", eng: "I am Maria.", context: "Formal introduction." },
            { kana: "がくせいです", romaji: "Gakusei desu.", eng: "I am a student.", context: "Dropping 'Watashi wa' when it's obvious." },
            { kana: "アメリカじんです", romaji: "Amerika jin desu.", eng: "I am American.", context: "Country + 'jin' = Nationality." },
            { kana: "よろしくおねがいします", romaji: "Yoroshiku onegaishimasu", eng: "Nice to meet you / Please treat me well.", context: "Always say this at the end of an introduction." }
          ],
          culture: "Japanese drops pronouns constantly. If someone asks your job, just say '[Job] desu'. Saying 'I am' every time sounds robotic!"
        },
        exercises: [
          { type: 'multiple_choice', question: "How would you say 'I am Anna'?", options: ["Anna wa watashi desu", "Watashi wa Anna desu", "Desu Anna watashi"], optionsKana: ["アンナはわたしです", "わたしはアンナです", "ですアンナわたし"], answer: 1, conceptTag: "Sentence Structure", feedback_incorrect: "Structure: [Watashi] + wa + [Name] + desu." },
          { type: 'speak', question: "Say 'I am a student' (Gakusei = student). Drop the 'I am'!", expectedRomaji: ["gakusei desu", "gakuseidesu"], expectedKana: ["がくせいです"], conceptTag: "Pronunciation", feedback_incorrect: "Say 'Gakusei desu'. (Gah-koo-say dess)." },
          { type: 'multiple_choice', question: "How do you state your nationality if you are from Italy (Itaria)?", options: ["Itaria desu", "Watashi wa Itaria", "Itaria jin desu"], optionsKana: ["イタリアです", "わたしはイタリア", "イタリアじんです"], answer: 2, conceptTag: "Nationality", feedback_incorrect: "Add 'jin' (person) after the country name! Itaria-jin desu." },
          { type: 'listen', question: "What is this person's nationality?", audioKana: "アメリカじんです", options: ["British", "American", "Australian"], answer: 1, conceptTag: "Listening Comp", feedback_incorrect: "They said 'Amerika jin' (American)." },
          { type: 'multiple_choice', question: "What is the crucial phrase to say at the end of an introduction?", options: ["Arigatou", "Sumimasen", "Yoroshiku onegaishimasu"], optionsKana: ["ありがとう", "すみません", "よろしくおねがいします"], answer: 2, conceptTag: "Culture", feedback_incorrect: "'Yoroshiku onegaishimasu' is essential for building good relations." },
          { type: 'speak', question: "Say 'Nice to meet you / Treat me well' (Polite)", expectedRomaji: ["yoroshiku onegaishimasu", "yoroshikuonegaishimasu"], expectedKana: ["よろしくおねがいします"], conceptTag: "Pronunciation", feedback_incorrect: "Yoroshiku o-ne-gai-shi-ma-su." },
          { type: 'listen', question: "What fact is this person stating?", audioKana: "がくせいです", options: ["I am Maria", "I am a student", "Nice to meet you"], answer: 1, conceptTag: "Listening", feedback_incorrect: "Gakusei = Student." },
          { type: 'speak', question: "State simply: '(I) am Italian.' (Itaria jin)", expectedRomaji: ["itaria jin desu", "itariajindesu"], expectedKana: ["イタリアじんです"], conceptTag: "Speaking", feedback_incorrect: "Say 'Itaria jin desu'." },
          { type: 'listen', question: "Listen to the full intro. Who is this?", audioKana: "わたしはジョンです", options: ["Maria", "John", "Anna"], answer: 1, conceptTag: "Listening", feedback_incorrect: "They said 'Watashi wa Jon (John) desu'." }
        ]
      },
      {

        topic: "Locations & Directions",
        theory: {
          intro: "You're in Tokyo, and you need the bathroom. Fast. Today is about finding things.",

            { kana: "トイレはどこですか", romaji: "Toire wa doko desu ka?", eng: "Where is the bathroom?", context: "Toire = Toilet" },
            { kana: "えきはどこですか", romaji: "Eki wa doko desu ka?", eng: "Where is the station?", context: "Eki = Station" },
            { kana: "コンビニはどこですか", romaji: "Konbini wa doko desu ka?", eng: "Where is the convenience store?", context: "Konbini is your lifeline in Japan." }

          culture: "Instead of pointing with one finger (which is rude), Japanese people use their whole open hand, palm facing up, to gesture toward a place."

        exercises: [
          { type: 'listen', question: "What is this person looking for?", audioKana: "えきはどこですか", options: ["The bathroom", "The train station", "A restaurant"], answer: 1, conceptTag: "Listening", feedback_incorrect: "Listen for 'Eki' (Station)." },
          { type: 'speak', question: "Ask: 'Where is the bathroom?'", expectedRomaji: ["toire wa doko desu ka", "toirewadokodesuka"], expectedKana: ["トイレはどこですか"], conceptTag: "Speaking Survival", feedback_incorrect: "Say: 'Toire wa doko desu ka?'" },
          { type: 'multiple_choice', question: "How do you ask 'Where is the convenience store?'", options: ["Konbini doko wa desu ka?", "Konbini wa doko desu ka?", "Doko wa konbini desu ka?"], optionsKana: ["コンビニどこはですか", "コンビニはどこですか", "どこはコンビニですか"], answer: 1, conceptTag: "Sentence Structure", feedback_incorrect: "The formula is [Place] + wa + doko + desu ka." },

          { type: 'speak', question: "Ask: 'Where is the hotel?' (Hoteru)", expectedRomaji: ["hoteru wa doko desu ka"], expectedKana: ["ホテルはどこですか"], conceptTag: "Speaking", feedback_incorrect: "Say 'Hoteru wa doko desu ka?'" },

            { kana: "わかりません", romaji: "Wakarimasen", eng: "I don't understand / I don't know", context: "Crucial! Use this instead of smiling and nodding." }
          ],
          culture: "If someone invites you out and you can't go, just sucking air through your teeth and saying 'Chotto...' is the polite way to say no!"
        },
        exercises: [
          { type: 'multiple_choice', question: "What is the most polite way to reject an invitation?", options: ["Iie!", "Chigaimasu!", "Chotto..."], optionsKana: ["いいえ！", "ちがいます！", "ちょっと..."], answer: 2, conceptTag: "Cultural Nuance", feedback_incorrect: "Directly saying 'Iie' is too harsh. 'Chotto...' leaves it trailing and polite." },
          { type: 'speak', question: "Say 'Yes, that is right.'", expectedRomaji: ["hai sou desu", "haisoudesu"], expectedKana: ["はいそうです", "はい、そうです"], conceptTag: "Pronunciation", feedback_incorrect: "Say 'Hai, sou desu'." },
          { type: 'multiple_choice', question: "A local starts speaking rapid Japanese to you. What should you say?", options: ["Hai, sou desu", "Wakarimasen", "Arigatou"], optionsKana: ["はい、そうです", "わかりません", "ありがとう"], answer: 1, conceptTag: "Survival", feedback_incorrect: "'Wakarimasen' means 'I don't understand'." },
          { type: 'listen', question: "What does this mean?", audioKana: "わかりません", options: ["I don't understand", "Where is it?", "Thank you"], answer: 0, conceptTag: "Listening", feedback_incorrect: "Wakarimasen = I don't understand / I don't know." },
          { type: 'speak', question: "Ask: 'Can you speak English?' (Eigo o hanasemasu ka?)", expectedRomaji: ["eigo o hanasemasu ka", "eigoohanasemasuka"], expectedKana: ["えいごをはなせますか"], conceptTag: "Speaking", feedback_incorrect: "Say: Eigo o hanasemasu ka?" },
          { type: 'multiple_choice', question: "If someone asks 'Are you American?' and you are British, how do you politely say 'No, that's wrong'?", options: ["Iie, chigaimasu", "Hai, sou desu", "Chotto..."], optionsKana: ["いいえ、ちがいます", "はい、そうです", "ちょっと..."], answer: 0, conceptTag: "Disagreement", feedback_incorrect: "'Iie, chigaimasu' means 'No, that's incorrect/different'." },
          { type: 'speak', question: "Say 'I don't understand/know'.", expectedRomaji: ["wakarimasen"], expectedKana: ["わかりません"], conceptTag: "Speaking", feedback_incorrect: "Wa-ka-ri-ma-sen." },
          { type: 'speak', question: "Say 'No, that is incorrect.'", expectedRomaji: ["iie chigaimasu"], expectedKana: ["いいえ、ちがいます", "いいえちがいます"], conceptTag: "Fluency", feedback_incorrect: "Iie, chigaimasu." }
        ]

        topic: "Restaurants & Stores",
        theory: {
          intro: "Time to buy things and eat! Let's order food and ask for prices without just pointing and grunting.",

          examples: [
            { kana: "これをください", romaji: "Kore o kudasai.", eng: "This, please.", context: "While pointing at a menu or item." },
            { kana: "いくらですか", romaji: "Ikura desu ka?", eng: "How much is it?", context: "Essential for shopping." },
            { kana: "おいしい", romaji: "Oishii", eng: "Delicious (Polite/Standard)", context: "Say this to the chef or waiter to make them happy." },

          { type: 'listen', question: "What is the customer asking?", audioKana: "いくらですか", options: ["Where is it?", "How much is it?", "Is it delicious?"], answer: 1, conceptTag: "Listening Comp", feedback_incorrect: "They asked 'Ikura desu ka?' (How much?)." },
          { type: 'speak', question: "Point at an item and say 'This, please.' (Kore = this)", expectedRomaji: ["kore o kudasai", "koreokudasai"], expectedKana: ["これをください"], conceptTag: "Ordering", feedback_incorrect: "Say 'Kore o kudasai'." },

          { type: 'speak', question: "Ask for water: 'Water, please.'", expectedRomaji: ["mizu o onegaishimasu", "mizu onegaishimasu"], expectedKana: ["みずをおねがいします"], conceptTag: "Ordering", feedback_incorrect: "Mizu o onegaishimasu." },
          { type: 'speak', question: "Ask 'How much is it?'", expectedRomaji: ["ikura desu ka", "ikuradesuka"], expectedKana: ["いくらですか"], conceptTag: "Fluency", feedback_incorrect: "I-ku-ra de-su ka?" }
        ]
      }
    ];

    // Procedural Generator for Days 6-30
    const generateFullMonth = () => {
      const fullCourse = [...DETAILED_LESSONS];
      const topics = [
        { name: "Numbers & Money", phraseKana: "ひゃくえん", phraseRomaji: "Hyaku en", phraseEng: "100 Yen" },
        { name: "Time & Scheduling", phraseKana: "いまなんじですか", phraseRomaji: "Ima nanji desu ka", phraseEng: "What time is it now?" },
        { name: "Train Travel", phraseKana: "きっぷ", phraseRomaji: "Kippu", phraseEng: "Ticket" },
        { name: "Hobbies & Fun", phraseKana: "たのしい", phraseRomaji: "Tanoshii", phraseEng: "Fun / Enjoyable" },
        { name: "Describing Things", phraseKana: "おおきい", phraseRomaji: "Ookii", phraseEng: "Big" },
        { name: "Weather Chat", phraseKana: "あついですね", phraseRomaji: "Atsui desu ne", phraseEng: "It's hot, isn't it?" },
        { name: "Expressing Feelings", phraseKana: "うれしい", phraseRomaji: "Ureshii", phraseEng: "Happy / Glad" },
        { name: "Emergencies", phraseKana: "たすけて", phraseRomaji: "Tasukete", phraseEng: "Help me" }
      ];
      
      for (let i = DETAILED_LESSONS.length + 1; i <= 30; i++) {
        const t = topics[i % topics.length];
        
        // Generate 12 varied exercises per day
        const dailyExercises = Array.from({ length: 12 }, (_, index) => {
          const typeNum = index % 4;
          if (typeNum === 0) {
            return { 
              type: 'multiple_choice', 
              question: `Vocabulary Check: What does "${t.phraseRomaji}" mean?`, 
              options: [t.phraseEng, "I don't know", "Where is the station?"], 
              answer: 0, 
              conceptTag: `Vocab Expansion` 
            };
          } else if (typeNum === 1) {
            return { 
              type: 'listen', 
              question: "Listen to the daily phrase:", 
              audioKana: t.phraseKana, 
              options: [t.phraseEng, "Amazing!", "Excuse me"], 
              answer: 0, 
              conceptTag: "Listening Focus" 
            };
          } else if (typeNum === 2) {
            return { 
              type: 'speak', 
              question: `Pronunciation Check: Say '${t.phraseEng}'`, 
              expectedRomaji: [t.phraseRomaji.toLowerCase().replace(/[^a-z]/g, '')], 
              expectedKana: [t.phraseKana], 
              conceptTag: "Speaking Check", 
              feedback_incorrect: `Try saying '${t.phraseRomaji}' clearly.` 
            };
          } else {
            // Complex Translation Exercise
            return {
              type: 'multiple_choice',
              question: `Translation Challenge: How do you say "${t.phraseEng}" in Japanese?`,
              options: [t.phraseRomaji, "Eki wa doko desu ka?", "Oishii desu"],
              optionsKana: [t.phraseKana, "えきはどこですか", "おいしいです"],
              answer: 0,
              conceptTag: "Full Translation"
            };
          }
        });

        fullCourse.push({
          day: i,
          title: `Day ${i}: ${t.name}`,
          topic: t.name,
          theory: {
            intro: `Welcome to Day ${i}. Today we expand your conversational ability regarding ${t.name}. This session requires 15-20 minutes of focus.`,
            concept: "Translating full thoughts and repetitive speaking builds true fluency. Read the phrase below and practice saying it out loud before starting.",
            examples: [
              { kana: t.phraseKana, romaji: t.phraseRomaji, eng: t.phraseEng, context: "Daily Focus Phrase" }
            ],
            culture: "Consistency is more important than intensity. Doing these exercises every single day will wire your brain for Japanese naturally."
          },
          exercises: dailyExercises
        });
      }
      return fullCourse;
    };

    const COURSE_DATA = generateFullMonth();

    const LIBRARY_DATA = [
      {
        category: "The Essentials",
        icon: "help-circle", iconColor: "text-blue-500",
        items: [
          { kana: "わかりません", romaji: "Wakarimasen", eng: "I don't understand / I don't know", context: "Crucial! Use this instead of smiling and nodding when lost." },
          { kana: "すみません", romaji: "Sumimasen", eng: "Excuse me / Sorry", context: "Use to get attention, apologize, or say a quick thanks." },
          { kana: "えいごをはなせますか", romaji: "Eigo o hanasemasu ka?", eng: "Can you speak English?", context: "Ask this before defaulting to English." },
          { kana: "はい / いいえ", romaji: "Hai / Iie", eng: "Yes / No", context: "Japanese people rarely say a blunt 'Iie' (No). Use 'Chotto...' (A little...) to decline politely." }
        ]
      },
      {
        category: "Shopping & Money",
        icon: "shopping-bag", iconColor: "text-pink-500",
        items: [
          { kana: "いくらですか", romaji: "Ikura desu ka?", eng: "How much is it?", context: "Essential for stores and markets." },
          { kana: "これをください", romaji: "Kore o kudasai", eng: "This, please.", context: "Point at the item and say this. 'Kudasai' is for requesting things." },

      {
        category: "Reactions & Compliments",
        icon: "smile", iconColor: "text-green-500",
        items: [
          { kana: "すごい！", romaji: "Sugoi!", eng: "Amazing! / Great!", context: "The ultimate reaction word. Use it when impressed by anything." },

          { kana: "ほんとう？", romaji: "Hontou?", eng: "Really?", context: "Use this to show active listening during a conversation." }

      },
      {
        category: "Restaurant & Dining",
        icon: "utensils", iconColor: "text-orange-500",
        items: [
          { kana: "おいしい", romaji: "Oishii", eng: "Delicious (Polite)", context: "The standard, polite way to praise food. Say it to the chef!" },
          { kana: "うまい", romaji: "Umai", eng: "Delicious (Casual)", context: "More casual, often used by men to say something is 'really tasty' or 'skillful'." },
          { kana: "メニュー、おねがいします", romaji: "Menyuu, onegaishimasu", eng: "Menu, please.", context: "'Onegaishimasu' is used for requesting services/actions." },
          { kana: "おかいけい、おねがいします", romaji: "Okaikei, onegaishimasu", eng: "The bill, please.", context: "Say this at the end of the meal, or cross your index fingers in an 'X'." }
        ]
      }
    ];

    // --- LOGIC & LOCAL FALLBACK (ANTI-CRASH) ---
    const loadLocalProgress = () => {
      try {
        const saved = localStorage.getItem('konnichi_save');
        if (saved) {
          const data = JSON.parse(saved);
          state.completedDays = data.completedDays || [];
          state.mistakesRecord = data.mistakesRecord || {};
          if (data.profileName) state.profileName = data.profileName;
        }
      } catch(e) { console.error("Local storage error", e); }
    };

    const initApp = async () => {
      // 1. Check if Firebase Config is injected (Works on Canvas, undefined on GitHub Pages)
      try {
        const configStr = typeof window.__firebase_config !== 'undefined' ? window.__firebase_config : null;
        if (configStr) {
          const config = JSON.parse(configStr);
          if (Object.keys(config).length > 0) {
            useFirebase = true;
            // Dynamically load Firebase ONLY if config exists. Prevents strict-mode blocks.
            const appMod = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
            const authMod = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
            const fsMod = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

            const appInstance = appMod.initializeApp(config);
            auth = authMod.getAuth(appInstance);
            db = fsMod.getFirestore(appInstance);

            doc = fsMod.doc; setDoc = fsMod.setDoc; onSnapshot = fsMod.onSnapshot;
            signOut = authMod.signOut; signInAnonymously = authMod.signInAnonymously; signInWithCustomToken = authMod.signInWithCustomToken;

            authMod.onAuthStateChanged(auth, (currentUser) => {
              state.user = currentUser;
              state.isAuthLoading = false;
              renderApp();
              if (currentUser) {
                const userDocRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'data');
                onSnapshot(userDocRef, (docSnap) => {
                  if (docSnap.exists()) {
                    const data = docSnap.data();
                    state.completedDays = data.completedDays || [];
                    state.mistakesRecord = data.mistakesRecord || {};
                    if (data.profileName) state.profileName = data.profileName;
                    if(state.currentView !== 'game') renderApp();
                  }
                }, (err) => console.error(err));
              }
            });

            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
            return; // Successfully initialized cloud
          }
        }
      } catch(e) {
        console.warn("Cloud init skipped/failed. Falling back to local storage.", e);
      }

      // 2. Local Fallback Execution (Always runs on GitHub Pages)
      useFirebase = false;
      state.user = { uid: 'local-user' };
      state.isAuthLoading = false;
      loadLocalProgress();
      renderApp();
    };

    const saveProgress = async (newCompleted, newMistakes) => {
      if (useFirebase && state.user && state.user.uid !== 'local-user') {
        try {
          const userDocRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'profile', 'data');
          await setDoc(userDocRef, {
            completedDays: newCompleted,
            mistakesRecord: newMistakes,
            profileName: state.profileName,
            lastUpdated: new Date().toISOString()
          }, { merge: true });
        } catch (e) { console.error("Failed to save:", e); }
      } else {
        localStorage.setItem('konnichi_save', JSON.stringify({
          completedDays: newCompleted,
          mistakesRecord: newMistakes,
          profileName: state.profileName
        }));
      }
    };

    // --- AUDIO & TRANSLATION LOGIC ---
    window.playAudio = (e, textKana) => {
      if (e) { e.stopPropagation(); e.preventDefault(); }
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(textKana);
        utterance.lang = 'ja-JP'; 
        utterance.rate = 0.85; 
        
        // Smart search for a Female Japanese Voice
        const voices = window.speechSynthesis.getVoices();
        const jpVoices = voices.filter(v => v.lang.includes('ja'));
        if(jpVoices.length > 0) {
          // Look for known female voice names
          let bestVoice = jpVoices.find(v => /Kyoko|Nanami|Google|Female|Haruka/i.test(v.name));
          if(!bestVoice) bestVoice = jpVoices[0];
          utterance.voice = bestVoice;
        }

        window.speechSynthesis.speak(utterance);
      } else {
        alert("Text-to-Speech not supported in this browser.");
      }
    };

    window.runTranslation = async () => {
      const inputEl = document.getElementById('transInput');
      if (!inputEl || !inputEl.value.trim()) return;
      
      const text = inputEl.value.trim();
      state.transLoading = true;
      state.transResult = "Translating...";
      renderApp();

      try {
        // Free MyMemory Translation API
        const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|ja`);
        const data = await res.json();
        if (data && data.responseData && data.responseData.translatedText) {
          state.transResult = data.responseData.translatedText;
        } else {
          state.transResult = "Could not translate.";
        }
      } catch(e) {
        state.transResult = "Network error. Try again.";
      }
      
      state.transLoading = false;
      renderApp();
    };

    // --- GLOBAL ACTIONS ---

      state.currentView = view;
      renderApp();

      state.activeDay = dayNum;
      state.currentView = 'theory';
      state.gameStep = 0;
      state.score = 0;
      state.selectedAnswer = null;
      state.showFeedback = false;
      state.currentMistakes = [];
      renderApp();
    };

    window.startGame = () => {
      state.currentView = 'game';
      renderApp();
    };

    window.handleMultipleChoiceAnswer = (index) => {
      if (state.showFeedback) return;
      state.selectedAnswer = index;
      state.showFeedback = true;
      
      const exercise = COURSE_DATA.find(d => d.day === state.activeDay).exercises[state.gameStep];
      if (index === exercise.answer) {
        state.score += 1;
      } else {
        state.currentMistakes.push(exercise.conceptTag);
      }
      renderApp();
    };

    window.handleSpeechRecognition = (e) => {
      if (e) e.preventDefault();
      if (state.selectedAnswer !== null || state.isRecording) return;

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        alert("Speech recognition isn't supported in your browser. Auto-passing this exercise for you!");
        state.score += 1;
        state.selectedAnswer = true;
        state.showFeedback = true;
        renderApp();
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = 'ja-JP';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      
      state.isRecording = true;
      renderApp();

      recognition.onresult = (event) => {
        state.isRecording = false;
        const transcript = event.results[0][0].transcript.toLowerCase().trim();
        const exercise = COURSE_DATA.find(d => d.day === state.activeDay).exercises[state.gameStep];
        
        const isMatch = exercise.expectedKana.includes(transcript) || exercise.expectedRomaji.some(r => transcript.includes(r));
        
        state.selectedAnswer = isMatch;
        state.showFeedback = true;
        if (isMatch) state.score += 1;
        else state.currentMistakes.push(exercise.conceptTag);
        
        renderApp();
      };

      recognition.onerror = (event) => {
        state.isRecording = false;
        if (event.error === 'not-allowed') {
          alert("Microphone access denied. Please allow microphone access.");
        } else { 
          state.score += 1; 
          state.selectedAnswer = true; 
          state.showFeedback = true; 
        }
        renderApp();
      };
      
      recognition.start();
    };

    window.nextQuestion = () => {
      const currentLesson = COURSE_DATA.find(d => d.day === state.activeDay);
      if (state.gameStep < currentLesson.exercises.length - 1) {
        state.gameStep += 1;
        state.selectedAnswer = null;
        state.showFeedback = false;
      } else {
        const newCompleted = state.completedDays.includes(state.activeDay) ? state.completedDays : [...state.completedDays, state.activeDay];
        const newMistakes = { ...state.mistakesRecord, [state.activeDay]: state.currentMistakes };
        
        state.completedDays = newCompleted;
        state.mistakesRecord = newMistakes;
        saveProgress(newCompleted, newMistakes);
        
        state.currentView = 'result';
      }
      renderApp();
    };

    window.updateProfileName = (val) => {
      state.profileName = val;
      saveProgress(state.completedDays, state.mistakesRecord);
      renderApp();
    };

    window.handleSwitchAccount = async () => {
      try {
        if (useFirebase && state.user && state.user.uid !== 'local-user') {
          await signOut(auth);
        } else {
          localStorage.removeItem('konnichi_save');
        }
        state.completedDays = [];
        state.mistakesRecord = {};
        state.profileName = `Learner_${Math.floor(Math.random() * 1000)}`;
        state.currentView = 'dashboard';
        saveProgress([], {}); 
        renderApp();
      } catch (e) { console.error(e); }
    };

    // --- RENDER FUNCTIONS ---
    const renderApp = () => {
      const root = document.getElementById('root');
      
      if (state.isAuthLoading) {
        root.innerHTML = `<div class="min-h-screen flex items-center justify-center bg-pink-50 text-pink-500"><i data-lucide="refresh-cw" class="animate-spin w-10 h-10"></i></div>`;
        lucide.createIcons();
        return;
      }

      let content = '';
      if (state.currentView === 'dashboard') content = renderDashboard();
      else if (state.currentView === 'theory') content = renderTheory();
      else if (state.currentView === 'game') content = renderGame();
      else if (state.currentView === 'result') content = renderResult();
      else if (state.currentView === 'library') content = renderLibrary();
      else if (state.currentView === 'profile') content = renderProfile();

      root.innerHTML = `
        ${renderNav()}
        <main class="p-4 md:p-8 pt-4 md:pt-8 pb-28 md:pb-8">
          ${content}
        </main>
      `;
      lucide.createIcons();
    };

    const renderNav = () => {

    const renderGame = () => {
      const lesson = COURSE_DATA.find(d => d.day === state.activeDay);
      const exercise = lesson.exercises[state.gameStep];
      const isAnswered = state.selectedAnswer !== null;
      
      let isCorrect = false;
      if (exercise.type === 'multiple_choice' || exercise.type === 'listen') isCorrect = isAnswered && state.selectedAnswer === exercise.answer;
      else if (exercise.type === 'speak') isCorrect = isAnswered && state.selectedAnswer === true;

      const progressWidth = (state.gameStep / lesson.exercises.length) * 100;
      const typeLabel = exercise.type === 'speak' ? 'Speaking Exercise' : exercise.type === 'listen' ? 'Listening Exercise' : 'Translation Check';

      let exerciseHtml = '';
      if (exercise.type === 'multiple_choice' || exercise.type === 'listen') {
        exerciseHtml = `<div class="space-y-4">` + exercise.options.map((opt, i) => {
          let btnClass = "bg-white border-2 border-gray-200 text-gray-700 hover:border-pink-400 hover:bg-pink-50";
          let iconHtml = '';
          if (isAnswered) {
            if (i === exercise.answer) {
              btnClass = "bg-green-50 border-2 border-green-500 text-green-800 shadow-md transform scale-[1.02]";
              iconHtml = `<i data-lucide="check-circle" class="text-green-500 w-6 h-6"></i>`;
            } else if (i === state.selectedAnswer) {
              btnClass = "bg-red-50 border-2 border-red-500 text-red-800";
              iconHtml = `<i data-lucide="x-circle" class="text-red-500 w-6 h-6"></i>`;
            } else {
              btnClass = "bg-gray-50 border-2 border-gray-200 text-gray-400 opacity-50";
            }
          }

          // AUDIO PLAYBACK ON OPTIONS
          let optionAudioBtn = '';
          if (exercise.optionsKana && exercise.optionsKana[i]) {
            optionAudioBtn = `
              <button onclick="window.playAudio(event, '${exercise.optionsKana[i]}')" class="p-2 md:p-3 bg-blue-50 text-blue-600 rounded-full hover:bg-blue-200 transition-colors shrink-0 z-10 border border-blue-100">
                 <i data-lucide="volume-2" class="w-5 h-5"></i>
              </button>
            `;
          }

          return `
            <div class="relative w-full rounded-2xl transition-all cursor-pointer shadow-sm hover:shadow-md ${btnClass}" onclick="if(!${isAnswered}) window.handleMultipleChoiceAnswer(${i})">
              <div class="flex justify-between items-center w-full p-4 md:p-5 h-full">
                <span class="font-bold text-lg pr-4">${opt}</span>
                <div class="flex items-center gap-3">
                  ${iconHtml}
                  ${optionAudioBtn}
                </div>
              </div>
            </div>
          `;
        }).join('') + `</div>`;
      } else if (exercise.type === 'speak') {
        const btnClasses = state.isRecording ? 'bg-red-500 scale-110 shadow-xl shadow-red-500/50 animate-pulse' : isAnswered ? 'bg-gray-200 text-gray-400' : 'bg-blue-500 hover:bg-blue-600 text-white shadow-xl hover:scale-105';
        const msg = state.isRecording ? "Listening... Speak clearly now!" : isAnswered ? "Analysis complete." : "Tap to speak the Japanese phrase";
        exerciseHtml = `
          <div class="flex flex-col items-center justify-center mt-10 space-y-8">
            <button ${isAnswered || state.isRecording ? 'disabled' : ''} 
              onmousedown="window.handleSpeechRecognition(event)" 
              ontouchstart="window.handleSpeechRecognition(event)" 
              class="relative w-36 h-36 rounded-full flex items-center justify-center transition-all ${btnClasses} no-select">
              <i data-lucide="mic" class="w-14 h-14"></i>
            </button>
            <p class="text-gray-500 font-bold text-center text-lg">${msg}</p>
          </div>
        `;
      }

      const feedbackClass = isCorrect ? 'bg-green-50 border border-green-200' : 'bg-orange-50 border border-orange-200';
      const iconClass = isCorrect ? 'bg-green-500' : 'bg-orange-500';
      const iconType = isCorrect ? 'check-circle' : 'message-circle';
      const headingClass = isCorrect ? 'text-green-800' : 'text-orange-800';
      const textClass = isCorrect ? 'text-green-700 font-medium' : 'text-orange-700 font-medium';
      const btnFeedClass = isCorrect ? 'bg-green-500 hover:bg-green-600 shadow-green-500/30' : 'bg-pink-500 hover:bg-pink-600 shadow-pink-500/30';
      const btnText = state.gameStep === lesson.exercises.length - 1 ? 'Finish Lesson' : 'Next Question';

      return `
      <div class="max-w-2xl mx-auto pb-20 mt-4 md:mt-8">
        <div class="mb-8 flex items-center gap-4 bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
          <div class="flex-grow bg-gray-100 h-4 rounded-full overflow-hidden shadow-inner">
            <div class="bg-gradient-to-r from-green-400 to-green-500 h-full transition-all duration-500" style="width: ${progressWidth}%"></div>
          </div>
          <span class="font-black text-gray-500 text-sm whitespace-nowrap">${state.gameStep + 1} / ${lesson.exercises.length}</span>
        </div>

        <div class="bg-white rounded-[2rem] shadow-xl p-6 md:p-10 min-h-[500px] flex flex-col border border-gray-100 relative overflow-hidden">
          <div class="flex-grow z-10">
            <div class="flex justify-center mb-8">
               <span class="bg-blue-100 text-blue-800 text-xs font-black px-4 py-1.5 rounded-full uppercase tracking-widest shadow-sm border border-blue-200">
                 ${typeLabel}
               </span>
            </div>

            ${exercise.type === 'listen' ? `
              <div class="flex justify-center mb-10">
                <button onclick="window.playAudio(event, '${exercise.audioKana}')" class="flex items-center justify-center gap-3 bg-blue-500 hover:bg-blue-600 text-white px-8 py-4 rounded-full transition-transform hover:scale-105 shadow-lg shadow-blue-500/30">
                  <i data-lucide="volume-2" class="w-6 h-6"></i><span class="font-black text-lg">Play Audio</span>
                </button>
              </div>
            ` : ''}
            
            <h2 class="text-2xl md:text-3xl font-black text-gray-800 mb-10 text-center leading-snug">
              ${exercise.question}
            </h2>

            ${exerciseHtml}
          </div>

          <div class="mt-10 transition-all duration-500 z-10 ${isAnswered ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4 hidden'}">
            <div class="p-6 rounded-2xl flex gap-4 items-start shadow-sm ${feedbackClass}">
              <div class="p-3 rounded-full text-white shrink-0 shadow-md ${iconClass}">
                  <i data-lucide="${iconType}" class="w-6 h-6"></i>
              </div>
              <div>
                <h4 class="font-black text-xl mb-1 ${headingClass}">${isCorrect ? 'Excellent!' : 'Sensei AI Feedback'}</h4>
                <p class="${textClass}">${isCorrect ? "Perfectly executed!" : exercise.feedback_incorrect}</p>
              </div>
            </div>
            <button onclick="window.nextQuestion()" class="w-full mt-6 py-5 rounded-full font-black text-xl text-white shadow-lg transition-transform transform hover:scale-105 ${btnFeedClass}">
              ${btnText}
            </button>
          </div>
        </div>
      </div>
      `;
    };

    const renderResult = () => {
      const lesson = COURSE_DATA.find(d => d.day === state.activeDay);
      const total = lesson.exercises.length;
      const isPerfect = state.score === total;

      const mistakesHtml = state.currentMistakes.length > 0 
        ? `<div class="bg-orange-50 border border-orange-200 text-orange-800 p-5 rounded-2xl mb-8 text-sm shadow-sm">
             <span class="font-black block mb-2 text-base"><i data-lucide="alert-circle" class="inline w-5 h-5 mr-1 align-text-bottom"></i> Concepts to review:</span>
             <ul class="list-disc pl-5 font-medium space-y-1">
               ${[...new Set(state.currentMistakes)].map(m => `<li>${m}</li>`).join('')}
             </ul>
           </div>` 
        : '';

      return `
      <div class="max-w-md mx-auto mt-16 text-center px-4">
        <div class="bg-white rounded-[2rem] shadow-2xl p-10 border border-gray-100">
          <div class="w-28 h-28 bg-gradient-to-br from-yellow-300 to-yellow-500 text-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-yellow-500/40">
            <i data-lucide="award" class="w-14 h-14"></i>
          </div>
          <h2 class="text-4xl font-black text-gray-800 mb-2">Complete!</h2>
          <p class="text-gray-500 mb-8 font-bold uppercase tracking-wider text-sm">Day ${state.activeDay}: ${lesson.topic}</p>
          
          <div class="text-7xl font-black text-pink-500 mb-4 drop-shadow-sm">${state.score}/${total}</div>
          
          ${mistakesHtml}

          <p class="text-lg font-bold text-gray-700 mb-10 leading-relaxed">
            ${isPerfect ? "Flawless victory! You maintained perfect accuracy. 🌸" : "Great effort! Consistency is the true key to fluency."}
          </p>
          <button onclick="window.changeView('dashboard')" class="w-full bg-blue-500 hover:bg-blue-600 text-white py-5 rounded-full font-black text-xl shadow-lg shadow-blue-500/30 transition-transform transform hover:scale-105">
            Return to Map
          </button>
        </div>
      </div>
      `;
    };

    const renderLibrary = () => {
      let html = `
      <div class="max-w-5xl mx-auto pb-24 mt-4 md:mt-8">
        
        <!-- TRANSLATOR WIDGET -->
        <div class="bg-white p-6 md:p-8 rounded-[2rem] shadow-xl border border-gray-100 mb-10">
          <h2 class="text-2xl font-black text-gray-800 mb-2 flex items-center gap-2">
            <i data-lucide="bot" class="text-blue-500 w-8 h-8"></i> AI Sensei Translator
          </h2>
          <p class="text-gray-500 font-medium mb-6 text-sm">Type an English phrase to translate it, then listen to the correct Japanese pronunciation.</p>
          <div class="flex flex-col md:flex-row gap-3 mb-2">
            <input type="text" id="transInput" value="${state.transInput}" onchange="state.transInput = this.value" placeholder="e.g., Where is the train station?" class="flex-grow border-2 border-gray-200 rounded-2xl p-4 font-medium focus:border-blue-500 outline-none transition-colors" />
            <button onclick="window.runTranslation()" class="bg-blue-500 hover:bg-blue-600 text-white px-8 py-4 rounded-2xl font-black transition-transform hover:scale-105 shadow-md flex justify-center items-center gap-2">
              ${state.transLoading ? `<i data-lucide="refresh-cw" class="animate-spin w-5 h-5"></i>` : `Translate`}
            </button>
          </div>
          
          ${state.transResult ? `
            <div class="mt-6 bg-blue-50 p-5 rounded-2xl border border-blue-100 flex justify-between items-center shadow-inner">
              <span class="text-xl md:text-2xl font-black text-gray-800">${state.transResult}</span>
              <button onclick="window.playAudio(event, '${state.transResult}')" class="bg-pink-500 hover:bg-pink-600 shadow-md text-white p-4 rounded-full transition-transform hover:scale-110 shrink-0">
                <i data-lucide="volume-2" class="w-6 h-6"></i>
              </button>
            </div>
          ` : ''}
        </div>

        <div class="bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-[2rem] p-8 md:p-10 mb-10 shadow-lg text-center md:text-left">
          <h1 class="text-3xl md:text-4xl font-black mb-3 flex items-center justify-center md:justify-start gap-3">
            <i data-lucide="book-marked" class="w-10 h-10"></i> Survival Guide
          </h1>
          <p class="text-indigo-100 text-lg font-medium">Master these words to navigate 90% of basic interactions.</p>
        </div>
        <div class="space-y-12">
      `;

      LIBRARY_DATA.forEach(section => {
        let itemsHtml = section.items.map(item => `
          <div class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-gray-100 flex flex-col justify-between hover:shadow-xl transition-shadow group">
            <div class="mb-4">
              <div class="flex justify-between items-start mb-3">
                <div>
                  <p class="text-2xl md:text-3xl font-black text-gray-900 mb-2 group-hover:text-blue-600 transition-colors">${item.kana}</p>
                  <p class="text-sm font-bold text-blue-500 uppercase tracking-widest">${item.romaji}</p>
                </div>
                <button onclick="window.playAudio(event, '${item.kana}')" class="shrink-0 flex items-center justify-center gap-2 bg-gray-50 hover:bg-blue-100 border border-gray-200 hover:border-blue-300 text-gray-700 hover:text-blue-700 px-4 py-3 rounded-full transition-all shadow-sm">
                  <i data-lucide="volume-2" class="w-5 h-5"></i>
                </button>
              </div>
              <p class="text-gray-800 font-bold text-lg mb-4">"${item.eng}"</p>
              <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                <span class="text-[10px] font-black text-pink-500 uppercase tracking-widest block mb-1">Teacher's Note</span>
                <p class="text-gray-600 text-sm font-medium leading-relaxed">${item.context}</p>
              </div>
            </div>
          </div>
        `).join('');

        html += `
          <section>
            <h2 class="text-2xl md:text-3xl font-black text-gray-800 mb-6 flex items-center gap-3 border-b-2 border-gray-100 pb-3">
              <i data-lucide="${section.icon}" class="${section.iconColor} w-8 h-8"></i> ${section.category}
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              ${itemsHtml}
            </div>
          </section>
        `;
      });

      html += `</div></div>`;
      return html;
    };

    const renderProfile = () => `
      <div class="max-w-md mx-auto mt-8 md:mt-16 px-4 pb-20">
        <div class="bg-white rounded-[2rem] shadow-xl p-8 border border-gray-100 text-center">
          <div class="w-24 h-24 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-6 border-4 border-blue-100 shadow-inner">
            <i data-lucide="user" class="w-12 h-12"></i>
          </div>
          <h2 class="text-3xl font-black text-gray-800 mb-2">Student Profile</h2>
          <p class="text-gray-500 mb-10 font-medium">Your progress is saved securely.</p>
          
          <div class="text-left mb-10">
            <label class="block text-sm font-black text-gray-700 mb-3 uppercase tracking-wider">Nickname</label>
            <input 
              type="text" 
              value="${state.profileName}"
              onchange="window.updateProfileName(this.value)"
              class="w-full border-2 border-gray-200 rounded-2xl p-4 text-xl font-black text-gray-800 focus:border-pink-500 outline-none transition-colors shadow-sm"
            />
          </div>

          <div class="bg-gradient-to-r from-gray-50 to-gray-100 p-6 rounded-3xl mb-10 flex justify-between items-center text-left border border-gray-200 shadow-inner">
            <div>
              <p class="text-gray-500 text-xs font-black uppercase tracking-widest mb-1">Days Mastered</p>
              <p class="text-4xl font-black text-green-500">${state.completedDays.length}</p>
            </div>
            <i data-lucide="award" class="text-yellow-400 w-12 h-12 drop-shadow-sm"></i>
          </div>

          <button onclick="window.handleSwitchAccount()" class="w-full bg-white border-2 border-gray-200 hover:bg-gray-50 hover:border-gray-300 text-gray-700 py-4 rounded-full font-bold shadow-sm transition-all flex justify-center items-center gap-2">
            <i data-lucide="log-out" class="w-5 h-5"></i> Switch Account / Start Fresh
          </button>
        </div>
      </div>
    `;

    // Boot App
    initApp();

  </script>
</body>
</html>
