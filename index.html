            { kana: "こんばんは", romaji: "Konbanwa", eng: "Good evening", context: "Use after sunset." },

    const generateFullMonth = () => {
      const fullCourse = [...DETAILED_LESSONS];
      const topics = ["Numbers & Counting", "Time & Dates", "Shopping Mastery", "Train Travel", "Hobbies & Fun", "Family Members", "Weather Chat", "Expressing Feelings", "Emergencies", "Review: Weeks 1-2"];
      
      for (let i = DETAILED_LESSONS.length + 1; i <= 30; i++) {
        const topic = topics[i % topics.length];
        const dailyExercises = Array.from({ length: 15 }, (_, index) => {
          const typeNum = index % 3;
          if (typeNum === 0) {
            return { type: 'multiple_choice', question: `Review Concept ${index + 1}: Which applies to ${topic}?`, options: ["Ganbatte (Do your best)", "Wakarimasen (I don't know)", "Sugoi (Amazing)"], answer: 0, conceptTag: `Vocab ${index}`, feedback_incorrect: "Keep reviewing your daily vocabulary list." };
          } else if (typeNum === 1) {
            return { type: 'listen', question: "Listen to the daily phrase:", audioKana: "がんばって", options: ["Do your best!", "Amazing!", "How much?"], answer: 0, conceptTag: "Listening Focus", feedback_incorrect: "Ganbatte means 'Do your best!'" };
          } else {
            return { type: 'speak', question: "Pronunciation Check: Say 'Do your best!'", expectedRomaji: ["ganbatte"], expectedKana: ["がんばって"], conceptTag: "Speaking Check", feedback_incorrect: "Say 'Gan-bat-te'." };
          }

          day: i,
          title: `Day ${i}: ${topic}`,
          topic: topic,
          theory: {
            intro: `Welcome to Day ${i}. Today we expand your vocabulary regarding ${topic}. This session requires 15-20 minutes of focus.`,

            culture: "Consistency is more important than intensity. Doing these 15 exercises every single day will wire your brain for Japanese naturally."
          },
          exercises: dailyExercises
        });
      }
      return fullCourse;
    };

          { kana: "すごい！", romaji: "Sugoi!", eng: "Amazing! / Great!", context: "The ultimate reaction word. Use it when impressed by anything." },
          { kana: "かわいい！", romaji: "Kawaii!", eng: "Cute!", context: "Used to describe fashion, items, animals, or people. A staple of pop culture." },
          { kana: "ほんとう？", romaji: "Hontou?", eng: "Really?", context: "Use this to show active listening during a conversation." }
        ]
      },
      {
        category: "Restaurant & Dining",
        icon: "utensils", iconColor: "text-orange-500",
        items: [
          { kana: "おいしい", romaji: "Oishii", eng: "Delicious (Polite)", context: "The standard, polite way to praise food. Say it to the chef!" },
          { kana: "うまい", romaji: "Umai", eng: "Delicious (Casual)", context: "More casual, often used by men to say something is 'really tasty' or 'skillful'." },
          { kana: "メニュー、おねがいします", romaji: "Menyuu, onegaishimasu", eng: "Menu, please.", context: "'Onegaishimasu' is used for requesting services/actions." },
          { kana: "おかいけい、おねがいします", romaji: "Okaikei, onegaishimasu", eng: "The bill, please.", context: "Say this at the end of the meal, or cross your index fingers in an 'X'." }
        ]
      },
      {
        category: "Medical & Help",
        icon: "heart-pulse", iconColor: "text-red-500",
        items: [
          { kana: "たすけてください", romaji: "Tasukete kudasai", eng: "Please help me!", context: "Emergency phrase." },
          { kana: "あたまがいたいです", romaji: "Atama ga itai desu", eng: "My head hurts.", context: "Atama (Head) + itai (hurts)." },
          { kana: "びょういんはどこですか", romaji: "Byouin wa doko desu ka?", eng: "Where is the hospital?", context: "Byouin = Hospital." }
        ]
      }
    ];

    // --- APPLICATION STATE ---
    const state = {
      user: null,
      profileName: "Learner",
      isAuthLoading: true,
      currentView: 'dashboard',
      activeDay: 1,
      completedDays: [],
      mistakesRecord: {},
      gameStep: 0,
      score: 0,
      selectedAnswer: null,
      showFeedback: false,
      isRecording: false,
      currentMistakes: []
    };

    // --- LOGIC & LOCAL FALLBACK ---
    let unsubscribeSnapshot = null;

    const loadLocalProgress = () => {
      try {
        const saved = localStorage.getItem('konnichi_save');
        if (saved) {
          const data = JSON.parse(saved);
          state.completedDays = data.completedDays || [];
          state.mistakesRecord = data.mistakesRecord || {};
          if (data.profileName) state.profileName = data.profileName;
        }
      } catch(e) { console.error("Local storage error", e); }
    };

    const initAuth = async () => {
      if (!useFirebase) {
        // Fallback for Github Pages / Local HTML
        state.user = { uid: 'local-user' };
        state.isAuthLoading = false;
        loadLocalProgress();
        renderApp();
        return;
      }

      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (error) {
        console.error("Auth error:", error);
        // Fallback if network is blocked
        state.user = { uid: 'local-user' };
        state.isAuthLoading = false;
        loadLocalProgress();
        renderApp();
      }
    };

    if (useFirebase) {
      onAuthStateChanged(auth, (currentUser) => {
        state.user = currentUser;
        state.isAuthLoading = false;
        renderApp();

        if (unsubscribeSnapshot) unsubscribeSnapshot();

        if (currentUser) {
          const userDocRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'data');
          unsubscribeSnapshot = onSnapshot(userDocRef, (docSnap) => {
            if (docSnap.exists()) {
              const data = docSnap.data();
              state.completedDays = data.completedDays || [];
              state.mistakesRecord = data.mistakesRecord || {};
              if (data.profileName) state.profileName = data.profileName;
              if(state.currentView !== 'game') renderApp();
            }
          }, (error) => console.error("Error fetching data:", error));
        }
      });
    }

    const saveProgress = async (newCompleted, newMistakes) => {
      if (useFirebase && state.user && state.user.uid !== 'local-user') {
        try {
          const userDocRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'profile', 'data');
          await setDoc(userDocRef, {
            completedDays: newCompleted,
            mistakesRecord: newMistakes,
            profileName: state.profileName,
            lastUpdated: new Date().toISOString()
          }, { merge: true });
        } catch (e) {
          console.error("Failed to save:", e);
        }
      } else {
        // Local Save Fallback
        localStorage.setItem('konnichi_save', JSON.stringify({
          completedDays: newCompleted,
          mistakesRecord: newMistakes,
          profileName: state.profileName
        }));
      }
    };

    // --- GLOBAL ACTIONS ---
    window.changeView = (view) => {
      state.currentView = view;
      renderApp();
    };

    window.startDay = (dayNum) => {
      state.activeDay = dayNum;
      state.currentView = 'theory';
      state.gameStep = 0;
      state.score = 0;
      state.selectedAnswer = null;
      state.showFeedback = false;
      state.currentMistakes = [];
      renderApp();
    };

    window.startGame = () => {
      state.currentView = 'game';
      renderApp();
    };

    window.handleMultipleChoiceAnswer = (index) => {
      if (state.showFeedback) return;
      state.selectedAnswer = index;
      state.showFeedback = true;
      
      const exercise = COURSE_DATA.find(d => d.day === state.activeDay).exercises[state.gameStep];
      if (index === exercise.answer) {
        state.score += 1;
      } else {
        state.currentMistakes.push(exercise.conceptTag);
      }
      renderApp();
    };

    window.handleSpeechRecognition = (e) => {
      if (e) e.preventDefault(); // Prevent double firing on touch
      if (state.selectedAnswer !== null || state.isRecording) return;

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        alert("Speech recognition isn't supported in your browser. Auto-passing this exercise for you!");
        state.score += 1;
        state.selectedAnswer = true;
        state.showFeedback = true;
        renderApp();
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = 'ja-JP';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      
      state.isRecording = true;
      renderApp();

      recognition.onresult = (event) => {
        state.isRecording = false;
        const transcript = event.results[0][0].transcript.toLowerCase().trim();
        const exercise = COURSE_DATA.find(d => d.day === state.activeDay).exercises[state.gameStep];
        
        const isMatch = exercise.expectedKana.includes(transcript) || exercise.expectedRomaji.some(r => transcript.includes(r));
        
        state.selectedAnswer = isMatch;
        state.showFeedback = true;
        if (isMatch) state.score += 1;
        else state.currentMistakes.push(exercise.conceptTag);
        
        renderApp();
      };

      recognition.onerror = (event) => {
        state.isRecording = false;
        if (event.error === 'not-allowed') {
          alert("Microphone access denied. Please allow microphone access.");
        } else { 
          state.score += 1; 
          state.selectedAnswer = true; 
          state.showFeedback = true; 
        }
        renderApp();
      };
      
      recognition.start();
    };

    window.nextQuestion = () => {
      const currentLesson = COURSE_DATA.find(d => d.day === state.activeDay);
      if (state.gameStep < currentLesson.exercises.length - 1) {
        state.gameStep += 1;
        state.selectedAnswer = null;
        state.showFeedback = false;
      } else {
        const newCompleted = state.completedDays.includes(state.activeDay) ? state.completedDays : [...state.completedDays, state.activeDay];
        const newMistakes = { ...state.mistakesRecord, [state.activeDay]: state.currentMistakes };
        
        state.completedDays = newCompleted;
        state.mistakesRecord = newMistakes;
        saveProgress(newCompleted, newMistakes);
        
        state.currentView = 'result';
      }
      renderApp();
    };

    window.updateProfileName = (val) => {
      state.profileName = val;
      saveProgress(state.completedDays, state.mistakesRecord);
      renderApp();
    };

    window.handleSwitchAccount = async () => {
      try {
        if (useFirebase && state.user && state.user.uid !== 'local-user') {
          await signOut(auth);
        } else {
          localStorage.removeItem('konnichi_save');
        }
        state.completedDays = [];
        state.mistakesRecord = {};
        state.profileName = `Learner_${Math.floor(Math.random() * 1000)}`;
        state.currentView = 'dashboard';
        saveProgress([], {}); // clear local store completely
        renderApp();
      } catch (e) { console.error(e); }
    };

    window.playAudio = (e, textKana) => {
      if (e) e.stopPropagation();
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(textKana);
        utterance.lang = 'ja-JP'; 
        utterance.rate = 0.85; 
        window.speechSynthesis.speak(utterance);
      } else {
        alert("Text-to-Speech not supported in this browser.");
      }
    };

    // --- RENDER FUNCTIONS ---
    const renderApp = () => {
      const root = document.getElementById('root');
      
      if (state.isAuthLoading) {
        root.innerHTML = `<div class="min-h-screen flex items-center justify-center bg-pink-50 text-pink-500"><i data-lucide="refresh-cw" class="animate-spin w-10 h-10"></i></div>`;
        lucide.createIcons();
        return;
      }

      let content = '';
      if (state.currentView === 'dashboard') content = renderDashboard();
      else if (state.currentView === 'theory') content = renderTheory();
      else if (state.currentView === 'game') content = renderGame();
      else if (state.currentView === 'result') content = renderResult();
      else if (state.currentView === 'library') content = renderLibrary();
      else if (state.currentView === 'profile') content = renderProfile();

      root.innerHTML = `
        ${renderNav()}
        <main class="p-4 md:p-8 pt-4 md:pt-8 pb-28 md:pb-8">
          ${content}
        </main>
      `;
      lucide.createIcons();
    };

    const renderNav = () => {
      return `
        <nav class="fixed bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-200 pb-safe md:relative md:border-b md:border-t-0 z-50">
          <div class="max-w-4xl mx-auto flex justify-around md:justify-center md:gap-16 p-3 md:p-4">
            <button onclick="window.changeView('dashboard')" class="flex flex-col items-center gap-1 transition-colors ${state.currentView === 'dashboard' ? 'text-pink-500' : 'text-gray-400 hover:text-gray-800'}">
              <i data-lucide="home" class="w-6 h-6"></i>
              <span class="text-[10px] md:text-xs font-bold uppercase tracking-wide">Map</span>
            </button>
            <button onclick="window.changeView('library')" class="flex flex-col items-center gap-1 transition-colors ${state.currentView === 'library' ? 'text-pink-500' : 'text-gray-400 hover:text-gray-800'}">
              <i data-lucide="library" class="w-6 h-6"></i>
              <span class="text-[10px] md:text-xs font-bold uppercase tracking-wide">Guide</span>
            </button>
            <button onclick="window.changeView('profile')" class="flex flex-col items-center gap-1 transition-colors ${state.currentView === 'profile' ? 'text-pink-500' : 'text-gray-400 hover:text-gray-800'}">
              <i data-lucide="user" class="w-6 h-6"></i>
              <span class="text-[10px] md:text-xs font-bold uppercase tracking-wide">Profile</span>
            </button>
          </div>
        </nav>
      `;
    };

    const renderDashboard = () => {
      let html = `
      <div class="max-w-4xl mx-auto pb-20">
        <header class="bg-gradient-to-r from-pink-500 to-orange-400 text-white rounded-3xl p-6 md:p-8 mb-8 shadow-lg flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
          <div>
            <h1 class="text-3xl md:text-4xl font-extrabold mb-2">Konnichi-WOW! 🌸</h1>
            <p class="text-pink-100 text-lg">Your 30-Day Path to Conversational Japanese.</p>
          </div>
          <div class="flex gap-4 w-full md:w-auto">
            <div class="flex-1 md:flex-none flex flex-col items-center justify-center bg-white/20 p-3 rounded-2xl backdrop-blur-sm">
              <i data-lucide="award" class="text-yellow-300 mb-1 w-7 h-7"></i>
              <span class="font-bold text-sm">${state.completedDays.length} / 30 Days</span>
            </div>
            <button onclick="window.changeView('profile')" class="flex-1 md:flex-none flex flex-col items-center justify-center bg-white/20 hover:bg-white/30 transition p-3 rounded-2xl backdrop-blur-sm">
              <i data-lucide="user" class="text-white mb-1 w-7 h-7"></i>
              <span class="font-bold text-sm truncate max-w-[80px]">${state.profileName}</span>
            </button>
          </div>
        </header>

        <div class="bg-white rounded-3xl shadow-sm p-4 md:p-8 mb-8 border border-gray-100">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
              <i data-lucide="map" class="text-blue-500 w-6 h-6"></i> Syllabus Map

          </div>

          <div class="space-y-4 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-1 before:bg-gradient-to-b before:from-pink-300 before:to-blue-300">
      `;

      COURSE_DATA.forEach(dayData => {
        const isCompleted = state.completedDays.includes(dayData.day);
        const isLocked = dayData.day > 1 && !state.completedDays.includes(dayData.day - 1);
        const dayMistakes = state.mistakesRecord[dayData.day] || [];
        const needsReview = isCompleted && dayMistakes.length > 0;

        let circleClass = "bg-pink-500 text-white transform scale-110 animate-pulse";

        if (isCompleted) { circleClass = "bg-green-500 text-white"; circleContent = `<i data-lucide="check-circle" class="w-5 h-5"></i>`; }
        else if (isLocked) { circleClass = "bg-gray-300 text-gray-500"; }

        let badgeHtml = '';
        if (isCompleted && !needsReview) badgeHtml += `<span class="text-xs font-semibold text-green-600 bg-green-50 px-2 py-1 rounded-md">Completed</span>`;
        if (needsReview) badgeHtml += `<span class="text-xs font-semibold text-orange-600 bg-orange-50 px-2 py-1 rounded-md flex items-center gap-1"><i data-lucide="alert-triangle" class="w-3 h-3"></i> Review Needed</span>`;
        if (isLocked) badgeHtml += `<span class="text-xs font-semibold text-gray-500 bg-gray-100 px-2 py-1 rounded-md">Locked</span>`;

        let btnHtml = '';

        }

        html += `
          <div class="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group ${isLocked ? 'opacity-50' : ''}">
            <div class="flex items-center justify-center w-10 h-10 rounded-full border-4 border-white shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 z-10 font-bold transition-transform ${circleClass}">

                  <p class="text-xs text-gray-400 font-medium mb-2">${dayData.exercises.length} Exercises (~15 mins)</p>
                  <div class="flex flex-wrap gap-2 mt-2">${badgeHtml}</div>
                </div>
                ${btnHtml}
              </div>
            </div>
          </div>
        `;
      });

      html += `</div></div></div>`;
      return html;
    };

    const renderTheory = () => {
      const lesson = COURSE_DATA.find(d => d.day === state.activeDay);
      
      let examplesHtml = lesson.theory.examples.map(ex => `
        <div class="bg-white border border-gray-200 p-5 rounded-2xl flex flex-col sm:flex-row sm:items-center justify-between gap-4 shadow-sm hover:border-blue-300 transition-colors">
          <div>
            <p class="text-2xl font-extrabold text-gray-900 mb-1">${ex.kana}</p>
            <p class="text-blue-600 font-bold mb-1">${ex.romaji}</p>
            <p class="text-gray-600 font-medium">"${ex.eng}"</p>
            ${ex.context ? `<p class="text-sm text-gray-500 mt-2 bg-gray-50 p-2 rounded-lg">${ex.context}</p>` : ''}
          </div>
          <button onclick="window.playAudio(event, '${ex.kana}')" class="flex items-center justify-center gap-2 bg-blue-100 hover:bg-blue-200 text-blue-700 px-4 py-2 rounded-full transition-colors shrink-0">
            <i data-lucide="volume-2" class="w-5 h-5"></i><span class="font-semibold text-sm">Listen</span>
          </button>
        </div>
      `).join('');

      return `
      <div class="max-w-3xl mx-auto pb-20 mt-4 md:mt-8">
        <button onclick="window.changeView('dashboard')" class="text-gray-500 mb-6 flex items-center hover:text-gray-800 font-medium">
          <i data-lucide="chevron-right" class="rotate-180 w-5 h-5 mr-1"></i> Back to Map
        </button>

        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">

            </span>

          <div class="p-6 md:p-8 space-y-8 text-gray-700 text-lg">

              <i data-lucide="message-circle" class="text-pink-500 shrink-0 mt-1 w-7 h-7"></i>
              <p class="leading-relaxed font-medium">${lesson.theory.intro}</p>
            </div>

            <div>
              <h3 class="font-bold text-gray-800 mb-2 flex items-center gap-2 text-xl">

            </button>
          </div>
        </div>
      </div>
      `;
    };

    const renderGame = () => {
      const lesson = COURSE_DATA.find(d => d.day === state.activeDay);
      const exercise = lesson.exercises[state.gameStep];
      const isAnswered = state.selectedAnswer !== null;
      
      let isCorrect = false;
      if (exercise.type === 'multiple_choice' || exercise.type === 'listen') isCorrect = isAnswered && state.selectedAnswer === exercise.answer;
      else if (exercise.type === 'speak') isCorrect = isAnswered && state.selectedAnswer === true;

      const progressWidth = (state.gameStep / lesson.exercises.length) * 100;
      const typeLabel = exercise.type === 'speak' ? 'Speaking Exercise' : exercise.type === 'listen' ? 'Listening Exercise' : 'Knowledge Check';

      let exerciseHtml = '';
      if (exercise.type === 'multiple_choice' || exercise.type === 'listen') {
        exerciseHtml = `<div class="space-y-4">` + exercise.options.map((opt, i) => {
          let btnClass = "bg-white border-2 border-gray-200 text-gray-700 hover:border-pink-400 hover:bg-pink-50";
          let iconHtml = '';
          if (isAnswered) {
            if (i === exercise.answer) {
              btnClass = "bg-green-50 border-2 border-green-500 text-green-800 font-bold";
              iconHtml = `<i data-lucide="check-circle" class="text-green-500 w-5 h-5"></i>`;
            } else if (i === state.selectedAnswer) {
              btnClass = "bg-red-50 border-2 border-red-500 text-red-800";
              iconHtml = `<i data-lucide="x-circle" class="text-red-500 w-5 h-5"></i>`;
            } else {
              btnClass = "bg-gray-50 border-2 border-gray-200 text-gray-400 opacity-50";
            }
          }
          return `
            <button ${isAnswered ? 'disabled' : ''} onclick="window.handleMultipleChoiceAnswer(${i})" class="w-full p-4 md:p-5 rounded-2xl text-lg transition-all text-left flex justify-between items-center ${btnClass}">
              <span>${opt}</span>
              ${iconHtml}
            </button>
          `;
        }).join('') + `</div>`;
      } else if (exercise.type === 'speak') {
        const btnClasses = state.isRecording ? 'bg-red-500 scale-110 shadow-lg shadow-red-500/50 animate-pulse' : isAnswered ? 'bg-gray-200 text-gray-400' : 'bg-blue-500 hover:bg-blue-600 text-white shadow-xl hover:scale-105';
        const msg = state.isRecording ? "Listening... Speak now!" : isAnswered ? "Analysis complete." : "Tap and speak the Japanese phrase";
        exerciseHtml = `
          <div class="flex flex-col items-center justify-center mt-8 space-y-6">
            <button ${isAnswered || state.isRecording ? 'disabled' : ''} 
              onmousedown="window.handleSpeechRecognition(event)" 
              ontouchstart="window.handleSpeechRecognition(event)" 
              class="relative w-32 h-32 rounded-full flex items-center justify-center transition-all ${btnClasses} no-select">
              <i data-lucide="mic" class="w-12 h-12"></i>
            </button>
            <p class="text-gray-500 font-medium text-center">${msg}</p>
          </div>
        `;
      }

      const feedbackClass = isCorrect ? 'bg-green-50 border border-green-200' : 'bg-orange-50 border border-orange-200';
      const iconClass = isCorrect ? 'bg-green-500' : 'bg-orange-500';
      const iconType = isCorrect ? 'check-circle' : 'message-circle';
      const headingClass = isCorrect ? 'text-green-800' : 'text-orange-800';
      const textClass = isCorrect ? 'text-green-700' : 'text-orange-700';
      const btnFeedClass = isCorrect ? 'bg-green-500 hover:bg-green-600' : 'bg-pink-500 hover:bg-pink-600';
      const btnText = state.gameStep === lesson.exercises.length - 1 ? 'Finish Lesson' : 'Next Question';

      return `
      <div class="max-w-2xl mx-auto pb-20 mt-4 md:mt-8">
        <div class="mb-8 flex items-center gap-4">
          <div class="flex-grow bg-gray-200 h-3 rounded-full overflow-hidden">
            <div class="bg-green-500 h-full transition-all duration-500" style="width: ${progressWidth}%"></div>
          </div>
          <span class="font-bold text-gray-500 text-sm">${state.gameStep + 1} / ${lesson.exercises.length}</span>
        </div>

        <div class="bg-white rounded-3xl shadow-xl p-6 md:p-8 min-h-[450px] flex flex-col border border-gray-100">
          <div class="flex-grow">
            <div class="flex justify-center mb-6">
               <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-widest">
                 ${typeLabel}
               </span>
            </div>

            ${exercise.type === 'listen' ? `
              <div class="flex justify-center mb-8">
                <button onclick="window.playAudio(event, '${exercise.audioKana}')" class="flex items-center justify-center gap-2 bg-blue-100 hover:bg-blue-200 text-blue-700 px-4 py-2 rounded-full transition-colors scale-125 transform shadow-md">
                  <i data-lucide="volume-2" class="w-5 h-5"></i><span class="font-semibold text-sm">Listen</span>
                </button>
              </div>
            ` : ''}
            
            <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mb-8 text-center leading-snug">
              ${exercise.question}
            </h2>

            ${exerciseHtml}
          </div>

          <div class="mt-8 transition-opacity duration-300 ${isAnswered ? 'opacity-100' : 'opacity-0 hidden'}">
            <div class="p-5 rounded-2xl flex gap-4 items-start ${feedbackClass}">
              <div class="p-2 rounded-full text-white shrink-0 ${iconClass}">
                  <i data-lucide="${iconType}" class="w-6 h-6"></i>
              </div>
              <div>
                <h4 class="font-bold text-lg mb-1 ${headingClass}">${isCorrect ? 'Excellent!' : 'Sensei AI Feedback'}</h4>
                <p class="${textClass}">${isCorrect ? "Perfectly executed!" : exercise.feedback_incorrect}</p>
              </div>
            </div>
            <button onclick="window.nextQuestion()" class="w-full mt-6 py-4 rounded-full font-bold text-lg text-white shadow-lg transition-transform transform hover:scale-105 ${btnFeedClass}">
              ${btnText}
            </button>
          </div>
        </div>
      </div>
      `;
    };

    const renderResult = () => {
      const lesson = COURSE_DATA.find(d => d.day === state.activeDay);
      const total = lesson.exercises.length;
      const isPerfect = state.score === total;

      const mistakesHtml = state.currentMistakes.length > 0 
        ? `<div class="bg-orange-50 text-orange-800 p-4 rounded-xl mb-6 text-sm">
             <span class="font-bold block mb-1">To review tomorrow:</span>
             ${[...new Set(state.currentMistakes)].join(', ')}
           </div>` 
        : '';

      return `
      <div class="max-w-md mx-auto mt-16 text-center px-4">
        <div class="bg-white rounded-3xl shadow-2xl p-10 border border-gray-100">
          <div class="w-24 h-24 bg-gradient-to-br from-yellow-200 to-yellow-400 text-yellow-700 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
            <i data-lucide="award" class="w-12 h-12"></i>
          </div>
          <h2 class="text-3xl font-extrabold text-gray-800 mb-2">Session Complete!</h2>
          <p class="text-gray-500 mb-8 font-medium">Day ${state.activeDay}: ${lesson.topic}</p>
          
          <div class="text-6xl font-black text-pink-500 mb-2">${state.score}/${total}</div>
          
          ${mistakesHtml}

          <p class="text-lg font-medium text-gray-700 mb-8">
            ${isPerfect ? "Flawless victory! You maintained perfect accuracy over 15+ minutes. 🌸" : "Great effort! Consistency is the key to fluency."}
          </p>
          <button onclick="window.changeView('dashboard')" class="w-full bg-blue-500 hover:bg-blue-600 text-white py-4 rounded-full font-bold text-lg shadow-lg transition-transform transform hover:scale-105">
            Return to Map
          </button>
        </div>
      </div>
      `;
    };

    const renderLibrary = () => {
      let html = `
      <div class="max-w-5xl mx-auto pb-24 mt-4 md:mt-8">
        <div class="bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-3xl p-8 mb-10 shadow-lg text-center md:text-left">
          <h1 class="text-3xl md:text-4xl font-extrabold mb-3 flex items-center justify-center md:justify-start gap-3">
            <i data-lucide="library" class="w-9 h-9"></i> Comprehensive Survival Guide
          </h1>
          <p class="text-indigo-100 text-lg">Master these words and you can navigate 90% of basic interactions in Japan.</p>
        </div>
        <div class="space-y-10">
      `;

      LIBRARY_DATA.forEach(section => {
        let itemsHtml = section.items.map(item => `
          <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between hover:shadow-md transition-shadow">
            <div class="mb-4">
              <div class="flex justify-between items-start mb-2">
                <div>
                  <p class="text-2xl font-extrabold text-gray-900 mb-1">${item.kana}</p>
                  <p class="text-md font-bold text-blue-600">${item.romaji}</p>
                </div>
                <button onclick="window.playAudio(event, '${item.kana}')" class="shrink-0 flex items-center justify-center gap-2 bg-blue-100 hover:bg-blue-200 text-blue-700 px-4 py-2 rounded-full transition-colors">
                  <i data-lucide="volume-2" class="w-4 h-4"></i><span class="font-semibold text-xs">Listen</span>
                </button>
              </div>
              <p class="text-gray-800 font-semibold mb-3">"${item.eng}"</p>
              <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                <span class="text-xs font-bold text-pink-500 uppercase tracking-wider block mb-1">Teacher's Note</span>
                <p class="text-gray-600 text-sm">${item.context}</p>
              </div>
            </div>
          </div>
        `).join('');

        html += `
          <section>
            <h2 class="text-2xl font-bold text-gray-800 mb-5 flex items-center gap-2 border-b-2 border-gray-100 pb-2">
              <i data-lucide="${section.icon}" class="${section.iconColor} w-6 h-6"></i> ${section.category}
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
              ${itemsHtml}
            </div>
          </section>
        `;
      });

      html += `</div></div>`;
      return html;
    };

    const renderProfile = () => `
      <div class="max-w-md mx-auto mt-8 md:mt-16 px-4 pb-20">
        <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100 text-center">
          <div class="w-20 h-20 bg-blue-100 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-6">
            <i data-lucide="user" class="w-10 h-10"></i>
          </div>
          <h2 class="text-2xl font-bold text-gray-800 mb-2">Student Profile</h2>
          <p class="text-gray-500 mb-8 text-sm">Your progress is saved securely.</p>
          
          <div class="text-left mb-8">
            <label class="block text-sm font-bold text-gray-700 mb-2">Nickname</label>
            <input 
              type="text" 
              value="${state.profileName}"
              onchange="window.updateProfileName(this.value)"
              class="w-full border-2 border-gray-200 rounded-xl p-3 text-lg font-bold text-gray-800 focus:border-pink-500 focus:outline-none transition-colors"
            />
          </div>

          <div class="bg-gray-50 p-4 rounded-2xl mb-8 flex justify-between items-center text-left">
            <div>
              <p class="text-gray-500 text-sm font-bold">Days Mastered</p>
              <p class="text-2xl font-black text-green-500">${state.completedDays.length}</p>
            </div>
            <i data-lucide="award" class="text-yellow-400 w-8 h-8"></i>
          </div>

          <button onclick="window.handleSwitchAccount()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 py-4 rounded-full font-bold shadow-sm transition-colors flex justify-center items-center gap-2">
            <i data-lucide="log-out" class="w-5 h-5"></i> Switch Account / Start Fresh
          </button>
        </div>
      </div>
    `;

    // Initialize application immediately
    initAuth();

  </script>
</body>
</html>
