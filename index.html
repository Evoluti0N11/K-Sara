<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Annyeong Sara! Parla Coreano in 45 Giorni</title>
  
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#fdfbf7">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
  
  <script>
    tailwind = { config: { darkMode: 'class' } }
  </script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --korean-pink: #f472b6; 
      --korean-blue: #60a5fa; 
      --hanbok-cream: #fdfbf7;
      --hangul-scale: 1; 
    }
    html, body {
      overscroll-behavior-y: none;
      -webkit-overflow-scrolling: touch;
      background-color: var(--hanbok-cream);
      font-family: 'Nunito', 'Noto Sans KR', sans-serif;
    }
    .bg-pattern {
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='#e2e8f0' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .pb-safe { padding-bottom: max(env(safe-area-inset-bottom), 24px); }
    .pt-safe { padding-top: max(env(safe-area-inset-top), 12px); }
    .no-select { user-select: none; -webkit-user-select: none; }
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    .korean-shadow { box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.08), 0 8px 10px -6px rgba(59, 130, 246, 0.04); }
    .hangul-watermark {
      position: absolute; right: -5%; top: -5%; font-size: 140px; color: rgba(0,0,0,0.03); font-weight: 900; pointer-events: none; user-select: none; z-index: 0; font-family: 'Noto Sans KR', sans-serif;
    }
    @keyframes pop { 0% { transform: scale(0.95); opacity: 0; } 50% { transform: scale(1.02); } 100% { transform: scale(1); opacity: 1; } }
    .animate-pop { animation: pop 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    .animate-fadein { animation: fadein 0.3s ease-in-out forwards; }
    @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(236, 72, 153, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(236, 72, 153, 0); } 100% { box-shadow: 0 0 0 0 rgba(236, 72, 153, 0); } }
    .recording-pulse { animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
    
    .chat-bubble::after { content: ''; position: absolute; bottom: -10px; left: 20px; border-width: 10px 10px 0 0; border-style: solid; border-color: #eff6ff transparent transparent transparent; }
    
    .custom-map-icon { background: transparent; border: none; }
    .custom-map-icon div { display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; background: white; border-radius: 50%; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border: 3px solid #f472b6; font-size: 22px; transition: transform 0.2s; }
    .leaflet-container { font-family: 'Nunito', sans-serif; z-index: 10; border-radius: 2rem; }
    .korean-click { cursor: pointer; position: relative; display: inline-block; border-bottom: 2px dashed #fbcfe8; transition: all 0.2s; font-size: calc(var(--hangul-scale) * 1em); }
    .korean-click:hover { color: #ec4899; border-bottom-color: #ec4899; background-color: #fdf2f8; border-radius: 4px; }
    .hangul-display { font-size: calc(var(--hangul-scale) * 1em); }
    
    html.dark body { background-color: #0f172a; color: #f8fafc; }
    html.dark .bg-pattern { background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231e293b' fill-opacity='0.8'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
    html.dark .bg-white { background-color: #1e293b !important; border-color: #334155 !important; color: #f8fafc !important; }
    html.dark nav, html.dark header.app-top-bar { background-color: rgba(15, 23, 42, 0.95) !important; border-color: #334155 !important; }
    .map-icon-locked div { filter: grayscale(1); opacity: 0.5; border-color: #94a3b8 !important; }
    @keyframes xp-fill { from { width: 0%; } }
    .xp-bar { animation: xp-fill 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* Builder & Matching Styles */
    .word-chip { cursor: pointer; transition: all 0.2s; user-select: none; }
    .word-chip:active { transform: scale(0.95); }
  </style>
</head>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
